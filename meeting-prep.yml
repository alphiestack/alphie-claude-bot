name: Meeting Prep

on:
  schedule:
    # Runs every hour, at minute 0. Adjust as needed.
    # Cron syntax: minute hour day month weekday (all UTC)
    - cron: '0 * * * *'
  workflow_dispatch: {} # lets you manually trigger a run from the GitHub UI for testing

jobs:
  meeting-prep:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the output file back to the repo
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis

      - name: Run meeting prep script
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: node meeting-prep.js

      - name: Commit output file back to repo
        run: |
          git config user.name "meeting-prep-bot"
          git config user.email "actions@github.com"
          git add meeting-prep-output.md
          git diff --staged --quiet || git commit -m "Update meeting prep output"
          git push
